{% extends "admin/base.html" %}
{% block title %}Проекты{% endblock %}
{% block content %}
<h1 class="h3 mb-4">Проекты</h1>
<div class="table-responsive card"><table class="table table-hover mb-0">
    <thead><tr><th>ID</th><th>Название</th><th>Команда</th><th>Задач</th><th>Создан</th><th></th></tr></thead>
    <tbody>
    {% for p in projects %}
    <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.name }}</td>
        <td>{{ p.team.name }}</td>
        <td>{{ p.tasks|length }}</td>
        <td class="text-muted small">{{ p.created_at.strftime('%d.%m.%Y') }}</td>
        <td>
            <form method="post" class="d-inline" onsubmit="return confirm('Удалить проект?')">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button formaction="{{ url_for('admin.project_delete', project_id=p.id) }}" class="btn btn-sm btn-outline-danger">Удалить</button>
            </form>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table></div>
{% endblock %}
